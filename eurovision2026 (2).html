<style>

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--dark);font-family:'Inter',sans-serif;overflow:hidden}
#app{height:100dvh;display:flex;flex-direction:column;max-width:480px;margin:0 auto}
.screens{flex:1;overflow:hidden;position:relative}
.screen{position:absolute;inset:0;overflow-y:auto;display:none;flex-direction:column;background:var(--bg)}
.screen.active{display:flex}
.f-h1{font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:28px;letter-spacing:-.5px;color:var(--dark);line-height:1.2}
.f-h2{font-family:'Plus Jakarta Sans',sans-serif;font-weight:600;font-size:18px;color:var(--dark)}
.f-h3{font-family:'Plus Jakarta Sans',sans-serif;font-weight:600;font-size:15px;color:var(--dark)}
.f-sm{font-size:12px;color:var(--muted)}
.f-xs{font-size:10px;color:var(--light);font-weight:500;text-transform:uppercase;letter-spacing:.5px}
.f-link{font-size:13px;color:#489FCD;font-weight:600}
.abar{background:var(--bg);padding:44px 16px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.abar-sm{background:var(--bg);padding:44px 16px 10px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.pad{padding:0 16px 24px;flex:1;overflow-y:auto}
.div{height:1px;background:var(--border);margin:10px 0}
.card{background:var(--bg2);border-radius:var(--r);padding:12px 14px;margin-bottom:8px}
.card-dark{background:var(--dark);border-radius:var(--r);padding:16px;margin-bottom:8px;position:relative;overflow:hidden}
.card-col{border-radius:var(--r);padding:14px;margin-bottom:8px;position:relative;overflow:hidden}
.fc{width:42px;height:42px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.fc-sm{width:32px;height:32px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.fc-lg{width:64px;height:64px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:36px;margin:8px auto}
.row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}

.avatar{width:32px;height:32px;border-radius:50%;background:var(--coral);display:flex;align-items:center;justify-content:center;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:14px;color:#fff;flex-shrink:0}
.btn{width:100%;padding:14px;border-radius:var(--r);font-size:15px;font-weight:600;border:none;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:opacity .15s,transform .1s}
.btn:active{transform:scale(.97);opacity:.9}
.btn:disabled{opacity:.35;cursor:default}
.btn-dark{background:var(--dark);color:#fff}
.btn-out{background:transparent;border:1.5px solid var(--border);color:var(--dark);margin-top:8px}
.pill{display:inline-block;padding:4px 10px;border-radius:99px;font-size:11px;font-weight:600}
.pill-dark{background:var(--dark);color:#fff}
.pill-lt{background:var(--bg);color:var(--dark)}
.pill-y{background:var(--yellow);color:var(--dark)}

.prog{height:5px;border-radius:3px;background:rgba(255,255,255,.25);overflow:hidden;margin-top:10px}
.prog-f{height:5px;border-radius:3px;background:var(--yellow)}
.slot{display:flex;align-items:center;gap:10px;background:var(--bg2);border-radius:var(--r);padding:10px 12px;margin-bottom:6px}
.slot-e{border:1.5px dashed var(--border);background:transparent;opacity:.5}
.sn{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;font-family:'Plus Jakarta Sans',sans-serif}

.sc-lbl{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.sc-val{font-family:'Plus Jakarta Sans',sans-serif;font-size:22px;font-weight:700;color:#fff}
.sl-track{position:relative;height:6px;border-radius:3px;background:rgba(255,255,255,.3)}

.ni{flex:1;text-align:center;font-size:10px;font-weight:600;color:var(--light);cursor:pointer}
.ni.on{color:var(--dark)}

.sh-handle{width:32px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 14px}
.sh-pad{padding:0 16px}
.c-opt{display:flex;align-items:center;gap:12px;padding:10px 16px;cursor:pointer}

.c-opt.sel{background:var(--coral);border-radius:var(--r);margin:0 8px;padding:10px}

.tog-row{display:flex;gap:8px;margin-bottom:10px}

.tog-p.on{background:var(--dark);color:#fff}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--dark);color:#fff;border-radius:20px;padding:10px 18px;font-size:14px;font-weight:600;z-index:500;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;max-width:90vw}
.toast.show{opacity:1}
.rv-card{border-radius:var(--rlg);padding:22px 16px;text-align:center;margin-bottom:10px;position:relative;overflow:hidden}
.rv-place{font-family:'Plus Jakarta Sans',sans-serif;font-size:56px;font-weight:800;color:#fff;line-height:1;letter-spacing:-2px}
.rv-country{font-family:'Plus Jakarta Sans',sans-serif;font-size:22px;font-weight:700;color:#fff}
.rv-sbox{background:rgba(255,255,255,.9);border-radius:8px;display:inline-block;padding:8px 20px;margin-top:12px}
.wait-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:32px;text-align:center}
.pulse{animation:pulse 1.5s ease-in-out infinite}

.match-exact{background:#d4edda;border:2px solid #28a745;border-radius:var(--r)}

.winner-card{background:linear-gradient(135deg,var(--yellow),#ffb300);border-radius:var(--r);padding:14px;text-align:center;margin-bottom:8px}
.v-chip{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:8px;margin:3px}
.adm-sec{background:var(--bg2);border-radius:var(--r);padding:14px;margin-bottom:10px}
.adm-ttl{font-size:10px;font-weight:700;color:var(--light);text-transform:uppercase;letter-spacing:.7px;margin-bottom:10px}
.adm-tog{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.adm-tog:last-child{border-bottom:none;padding-bottom:0}
.sw{width:42px;height:24px;border-radius:12px;background:var(--border);border:none;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
.sw.on{background:var(--coral)}
.sw::after{content:'';position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:transform .2s}
.sw.on::after{transform:translateX(18px)}
.ei{flex:1;background:var(--bg);border:none;border-radius:8px;padding:8px 10px;font-size:13px;color:var(--dark);font-family:'Inter',sans-serif;outline:none}

@keyframes cfFall{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(100dvh) rotate(720deg);opacity:0}}

const isoMap={'Австрия':'at','Албания':'al','Армения':'am','Австралия':'au','Азербайджан':'az','Бельгия':'be','Швейцария':'ch','Кипр':'cy','Чехия':'cz','Дания':'dk','Эстония':'ee','Финляндия':'fi','Франция':'fr','Великобритания':'gb','Грузия':'ge','Германия':'de','Греция':'gr','Хорватия':'hr','Израиль':'il','Италия':'it','Литва':'lt','Люксембург':'lu','Молдова':'md','Мальта':'mt','Норвегия':'no','Польша':'pl','Португалия':'pt','Румыния':'ro','Сербия':'rs','Швеция':'se','Сан-Марино':'sm','Словения':'si','Украина':'ua','Черногория':'me','Болгария':'bg','Латвия':'lv'};

}

  if(!countries.length){

      {id:4,flag:'🇦🇺',name:'Австралия',artist:'Go-Jo',order_num:4},
      {id:5,flag:'🇦🇿',name:'Азербайджан',artist:'Mamagama',order_num:5},
      {id:6,flag:'🇧🇪',name:'Бельгия',artist:'Red Sebastian',order_num:6},
      {id:7,flag:'🇨🇭',name:'Швейцария',artist:'Zoë Më',order_num:7},
      {id:8,flag:'🇨🇾',name:'Кипр',artist:'Theo Evan',order_num:8},
      {id:9,flag:'🇨🇿',name:'Чехия',artist:'ADONXS',order_num:9},
      {id:10,flag:'🇩🇰',name:'Дания',artist:'Sissal',order_num:10},
      {id:11,flag:'🇪🇪',name:'Эстония',artist:'Tommy Cash',order_num:11},
      {id:12,flag:'🇫🇮',name:'Финляндия',artist:'Erika Vikman',order_num:12},
      {id:13,flag:'🇫🇷',name:'Франция',artist:'Louane',order_num:13},
      {id:14,flag:'🇬🇧',name:'Великобритания',artist:'Remember Monday',order_num:14},
      {id:15,flag:'🇬🇪',name:'Грузия',artist:'Mariam Bigvava',order_num:15},
      {id:16,flag:'🇩🇪',name:'Германия',artist:'Abor & Tynna',order_num:16},

    ];
    await sb.from('esc_countries').insert(tmp);
    countries=tmp;
  }
  settings={};(sR.data||[]).forEach(r=>settings[r.key]=r.value);

  predictions={};(pR.data||[]).forEach(p=>predictions[p.user_name]=p.picks);

let _pollTimer=null;
function startPolling(){
  clearInterval(_pollTimer);
  _pollTimer=setInterval(async()=>{
    const {data}=await sb.from('esc_settings').select('*');
    if(!data)return;
    let changed=false;
    data.forEach(r=>{if(settings[r.key]!==r.value){settings[r.key]=r.value;changed=true;}});
    if(!changed)return;

    /* sync reveal state for non-admin */
    if(currentUser!==ADMIN_NAME){
      const rvState=settings.reveal_state;
      if(rvState){
        try{
          const st=JSON.parse(rvState);
          if(st&&typeof st.index==='number'){
            const wasOpen=!!$('s-rev');
            _rph=st.phase||'song';
            _ri=st.index;
            _rd=calcRes(_rph);
            if(!wasOpen){
              /* auto-open reveal screen */
              buildReveal(true);
            } else {
              renderRev($('s-rev'));
            }
          }
        }catch(e){}
      }
      /* refresh main if settings changed */
      if($('s-main'))buildMain();
    }
  },2000);
}

    '</div>'+
    '<div class="pad" style="padding-top:20px;">'+
      '<div class="f-xs" style="margin-bottom:6px;">Твоё имя</div>'+
      '<div class="card" style="padding:0;margin-bottom:12px;">'+
        '<input id="li" type="text" placeholder="Введи имя..." maxlength="20" style="width:100%;padding:13px 14px;border:none;border-radius:var(--r);font-size:16px;font-weight:600;font-family:\'Plus Jakarta Sans\',sans-serif;color:var(--dark);background:var(--bg2);outline:none;">'+
      '</div>'+
      (users.length?'<div class="f-xs" style="margin-bottom:7px;">Или выбери:</div><div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;">'+users.map(u=>'<div class="pill pill-lt" style="cursor:pointer;" onclick="quickLogin(\''+esc(u)+'\')">'+esc(u)+'</div>').join('')+'</div>':'')+
      '<button class="btn btn-dark" onclick="doLogin()">Войти →</button>'+

  closeSheet();toast(_sc.flag+' '+_sc.name+' — оценка сохранена!');

/* ── REVEAL ── */
let _rph='song',_rd=[],_ri=-1;
const phLbl={song:'🎵 Топ-5 по ПЕСНЕ',show:'🎭 Топ-5 по НОМЕРУ',total:'🏆 Общий победитель'};
const phCol={song:'var(--coral)',show:'var(--rose)',total:'var(--blue)'};

function calcRes(ph){
  const s={};countries.forEach(c=>{s[c.id]={country:c,total:0,count:0,voters:{}}});
  Object.entries(allVotes).forEach(([u,uv])=>{Object.entries(uv).forEach(([cid,v])=>{if(!s[cid])return;const val=ph==='song'?v.song_score:ph==='show'?v.show_score:(v.song_score+v.show_score);s[cid].total+=val;s[cid].count+=1;s[cid].voters[u]=ph==='total'?((v.song_score+v.show_score)/2).toFixed(1):(ph==='song'?v.song_score:v.show_score)})});
  return Object.values(s).filter(x=>x.count>0).sort((a,b)=>(b.total/b.count)-(a.total/a.count)).slice(0,5).reverse();
}

function buildReveal(fromRealtime){
  _rph=_rph||'song';
  if(!fromRealtime){
    _rd=calcRes('song');_ri=-1;
    /* write initial state so others can join */
    if(currentUser===ADMIN_NAME){
      sb.from('esc_settings').upsert({key:'reveal_state',value:JSON.stringify({phase:'song',index:-1})},{onConflict:'key'});
      sb.from('esc_settings').upsert({key:'reveal_active',value:'true'},{onConflict:'key'});
      settings.reveal_active='true';

  } else {
    _rd=calcRes(_rph);
  }
  removeScreen('s-rev');

    '</div>'+
    '<div class="card" style="margin-bottom:8px;"><div class="f-xs" style="margin-bottom:8px;">ОЦЕНКИ УЧАСТНИКОВ</div>'+
    Object.entries(item.voters).map(([u,sc])=>'<div class="v-chip" style="background:var(--bg);width:100%;"><div style="width:26px;height:26px;border-radius:7px;background:'+bg+';display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;font-family:\'Plus Jakarta Sans\',sans-serif;">'+esc(u.charAt(0).toUpperCase())+'</div><div class="f-sm" style="font-weight:600;">'+esc(u)+'</div><div style="margin-left:auto;font-size:13px;font-weight:700;color:'+bg+';font-family:\'Plus Jakarta Sans\',sans-serif;">'+sc+'</div></div>').join('')+
    '</div>'+
    (currentUser===ADMIN_NAME?'<button class="btn btn-dark" onclick="rnext()">'+(last&&_rph==='total'?'🎊 Конец!':last?'▶ Следующая категория':'▶ Следующее место')+'</button>':'<div style="text-align:center;font-size:13px;color:var(--muted);padding:8px;">Ждём следующего...</div>')+
    '</div>';
  if(place===1)confetti();
}

function rnext(){
  _ri++;
  if(_ri>=_rd.length){
    if(_rph==='song'){_rph='show';_rd=calcRes('show')}
    else if(_rph==='show'){_rph='total';_rd=calcRes('total')}
    _ri=-1;
  }
  const c=$('s-rev');if(c)renderRev(c);
  /* sync to DB so others see same state */
  if(currentUser===ADMIN_NAME){
    sb.from('esc_settings').upsert({key:'reveal_state',value:JSON.stringify({phase:_rph,index:_ri})},{onConflict:'key'});
  }
}
function setRP(p){_rph=p;_rd=calcRes(p);_ri=-1;const c=$('s-rev');if(c)renderRev(c)}

function confetti(){const cols=['#E0533D','#E78C9D','#EED868','#9DA7D0','#469B88','#377CC8'];for(let i=0;i<60;i++){const el=document.createElement('div'),sz=Math.random()*8+4;el.style.cssText='position:fixed;pointer-events:none;z-index:999;border-radius:2px;left:'+Math.random()*100+'%;width:'+sz+'px;height:'+sz*.6+'px;background:'+cols[Math.floor(Math.random()*cols.length)]+';animation:cfFall '+(Math.random()*2+1.5)+'s linear '+Math.random()*.5+'s forwards';document.body.appendChild(el);setTimeout(()=>el.remove(),3000)}}

/* ── PREDICT REVEAL ── */
let officialTop5=[]; /* filled by admin */

function buildPredReveal(){
  removeScreen('s-pr');
  const div=document.createElement('div');div.className='screen active';div.id='s-pr';
  $('screens').appendChild(div);
  renderPredReveal(div);
  setScreen('s-pr');
}

async function loadOfficialTop5(){
  const {data}=await sb.from('esc_settings').select('value').eq('key','official_top5').single();
  if(data&&data.value){try{officialTop5=JSON.parse(data.value)}catch(e){officialTop5=[]}}
}

async function saveOfficialTop5(){
  officialTop5=officialTop5.filter(Boolean);
  await sb.from('esc_settings').upsert({key:'official_top5',value:JSON.stringify(officialTop5)},{onConflict:'key'});
  toast('Официальный топ-5 сохранён!');
  const d=$('s-pr');if(d)renderPredReveal(d);
}

function renderPredReveal(div){
  const users=Object.keys(predictions);
  const hasOfficial=officialTop5.length===5;

  /* score each user's prediction */
  function userScore(picks){
    if(!hasOfficial)return 0;
    let sc=0;
    picks.filter(Boolean).forEach((cid,i)=>{if(String(officialTop5[i])===String(cid))sc++});
    return sc;
  }
  const scored=users.map(u=>({u,score:userScore(predictions[u]||[])})).sort((a,b)=>b.score-a.score);
  const maxScore=scored.length?scored[0].score:0;
  const winners=scored.filter(x=>x.score===maxScore&&x.score>0).map(x=>x.u);

  div.innerHTML=
    '<div class="abar-sm">'+
      '<button onclick="removeScreen(\'s-pr\');buildMain();" style="background:var(--bg2);border:1px solid var(--border);border-radius:8px;width:32px;height:32px;font-size:18px;cursor:pointer;color:var(--dark);display:flex;align-items:center;justify-content:center;">‹</button>'+
      '<div><div class="f-h3">🔮 Предикты</div><div class="f-sm">'+users.length+' участников</div></div>'+
    '</div>'+
    '<div class="pad">'+

    /* ADMIN: enter official top5 */
    (currentUser===ADMIN_NAME?
      '<div class="adm-sec" style="margin-bottom:10px;">'+
        '<div class="adm-ttl">Официальный топ-5 Eurovision</div>'+
        '<div style="display:flex;flex-direction:column;gap:6px;margin-bottom:8px;" id="off5-slots">'+
        [0,1,2,3,4].map(i=>{
          const cid=officialTop5[i];
          const c=cid?countries.find(x=>String(x.id)===String(cid)):null;
          return'<div style="display:flex;align-items:center;gap:8px;">'+
            '<div style="width:22px;text-align:center;font-size:12px;font-weight:700;color:var(--muted);">'+(i+1)+'</div>'+
            '<select class="ei" onchange="setOff5('+i+',this.value)" style="flex:1;">'+
              '<option value="">— место '+(i+1)+' —</option>'+
              countries.map(co=>'<option value="'+co.id+'" '+(String(cid)===String(co.id)?'selected':'')+'>'+co.name+'</option>').join('')+
            '</select>'+
          '</div>';
        }).join('')+
        '</div>'+
        '<button class="btn btn-dark" onclick="saveOfficialTop5()" style="padding:10px;">Сохранить официальный топ-5</button>'+
      '</div>' : '')+

    /* OFFICIAL TOP5 display */
    (hasOfficial?
      '<div class="f-xs" style="margin-bottom:8px;">ОФИЦИАЛЬНЫЙ РЕЗУЛЬТАТ EUROVISION</div>'+
      '<div class="card" style="padding:0 14px;margin-bottom:14px;">'+
      officialTop5.map((cid,i)=>{
        const c=countries.find(x=>String(x.id)===String(cid));
        if(!c)return'';
        const medals=['🥇','🥈','🥉','4️⃣','5️⃣'];
        return'<div class="row" style="padding:8px 0;">'+
          '<div style="font-size:18px;width:26px;">'+medals[i]+'</div>'+
          fc(c.flag,'sm',c.name)+
          '<div class="f-h3" style="font-size:14px;">'+esc(c.name)+'</div>'+
        '</div>';
      }).join('')+
      '</div>' : '')+

    /* WINNER badge */
    (hasOfficial&&winners.length?
      '<div class="winner-card">'+
        '<div class="f-xs" style="color:rgba(0,0,0,.5);margin-bottom:4px;">🏆 ЛУЧШИЙ ПРЕДИКТ</div>'+
        '<div style="font-size:18px;font-weight:800;color:var(--dark);">'+winners.map(w=>esc(w)).join(', ')+'</div>'+
        '<div style="font-size:13px;color:rgba(0,0,0,.5);margin-top:2px;">'+maxScore+' точных совпадений из 5</div>'+
      '</div>' : '')+

    /* EACH USER prediction */
    '<div class="f-xs" style="margin:12px 0 8px;">ПРЕДИКТЫ УЧАСТНИКОВ</div>'+
    (users.length?scored.map(({u,score})=>{
      const pks=predictions[u]||[];
      return'<div class="card" style="margin-bottom:8px;">'+
        '<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">'+
          '<div class="avatar" style="font-size:13px;">'+esc(u.charAt(0).toUpperCase())+'</div>'+
          '<div class="f-h3" style="font-size:14px;flex:1;">'+esc(u)+'</div>'+
          (hasOfficial?'<div style="background:var(--ok);color:#fff;border-radius:8px;padding:3px 10px;font-size:12px;font-weight:700;">'+score+'/5 ✓</div>':'')+
        '</div>'+
        pks.filter(Boolean).map((cid,i)=>{
          const c=countries.find(x=>String(x.id)===String(cid));
          if(!c)return'';
          const isMatch=hasOfficial&&String(officialTop5[i])===String(cid);
          return'<div class="row '+(isMatch?'match-exact':'')+(hasOfficial&&!isMatch?' no-match':'')+'" style="padding:8px '+(isMatch?'10px':'0')+';">'+
            '<div style="font-size:11px;font-weight:700;color:var(--muted);width:18px;text-align:center;">'+(i+1)+'</div>'+
            fc(c.flag,'sm',c.name)+
            '<div style="flex:1;"><div class="f-h3" style="font-size:13px;">'+esc(c.name)+'</div></div>'+
            (isMatch?'<div style="color:var(--ok);font-size:16px;">✓</div>':'')+
          '</div>';
        }).join('')+
      '</div>';
    }).join(''):
    '<div class="card" style="text-align:center;padding:24px;color:var(--light);">Предиктов пока нет</div>')+
    '</div>';
}

function setOff5(i,val){officialTop5[i]=val?parseInt(val):'';}

/* ── ADMIN ── */
function buildAdmin(){
  removeScreen('s-adm');const div=document.createElement('div');div.className='screen active';div.id='s-adm';
  $('screens').appendChild(div);renderAdm(div);setScreen('s-adm');
}
function renderAdm(c){
  const rOn=settings.reveal_active==='true',pOn=settings.predictions_reveal==='true';
  c.innerHTML=
    '<div class="abar-sm"><button onclick="removeScreen(\'s-adm\');buildMain();" style="background:var(--bg2);border:1px solid var(--border);border-radius:8px;width:32px;height:32px;font-size:18px;cursor:pointer;color:var(--dark);display:flex;align-items:center;justify-content:center;">‹</button><div class="f-h3">Панель администратора</div></div>'+
    '<div class="pad">'+
    '<div class="adm-sec"><div class="adm-ttl">Управление показом</div>'+
      '<div class="adm-tog"><div><div class="f-h3" style="font-size:14px;">Reveal результатов</div><div class="f-sm">Открыть итоги всем</div></div><button class="sw '+(rOn?'on':'')+'" onclick="togSet(\'reveal_active\',this)"></button></div>'+
      '<div class="adm-tog"><div><div class="f-h3" style="font-size:14px;">Reveal предиктов</div><div class="f-sm">Показать предикты</div></div><button class="sw '+(pOn?'on':'')+'" onclick="togSet(\'predictions_reveal\',this)"></button></div>'+
    '</div>'+
    '<div class="adm-sec"><div class="adm-ttl">Страны финала ('+countries.length+')</div><div id="acl"></div>'+
      '<div class="add-row"><input class="ei" id="nf" placeholder="🏳️" style="width:46px;flex:none;text-align:center;"><input class="ei" id="nn" placeholder="Страна"><input class="ei" id="na" placeholder="Артист"><button class="add-btn" onclick="addC()">+</button></div>'+
    '</div>'+
    '<div class="adm-sec"><div class="adm-ttl">Статус голосования</div>'+renderVS()+'</div>'+
    '</div>';
  renderACL();
}
function renderACL(){const el=$('acl');if(!el)return;el.innerHTML=countries.map(c=>'<div class="er"><input class="ei" value="'+esc(c.flag||'')+'" style="width:40px;flex:none;text-align:center;" onchange="updC('+c.id+',\'flag\',this.value)" placeholder="🏳️"><input class="ei" value="'+esc(c.name)+'" onchange="updC('+c.id+',\'name\',this.value)"><input class="ei" value="'+esc(c.artist||'')+'" onchange="updC('+c.id+',\'artist\',this.value)" placeholder="Артист"><button class="del-btn" onclick="delC('+c.id+')">🗑</button></div>').join('')}
function renderVS(){const u=Object.keys(allVotes);if(!u.length)return'<div class="f-sm">Голосов пока нет</div>';return u.map(u=>'<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px;"><span>'+esc(u)+'</span><span class="f-sm">'+Object.keys(allVotes[u]).length+' / '+countries.length+'</span></div>').join('')}
async function togSet(k,btn){const on=btn.classList.contains('on'),v=on?'false':'true';btn.classList.toggle('on');settings[k]=v;await sb.from('esc_settings').upsert({key:k,value:v},{onConflict:'key'});toast(v==='true'?'✅ Включено':'❌ Выключено')}
const _ct={};
async function updC(id,f,v){clearTimeout(_ct[id+f]);_ct[id+f]=setTimeout(async()=>{const u={};u[f]=v;await sb.from('esc_countries').update(u).eq('id',id);const c=countries.find(x=>x.id===id);if(c)c[f]=v},700)}
async function addC(){const flag=$('nf').value.trim()||'🏳️',name=$('nn').value.trim(),artist=$('na').value.trim();if(!name){toast('Введи название');return}const on=countries.length+1;const{data,error}=await sb.from('esc_countries').insert({flag,name,artist,order_num:on}).select().single();if(error){toast('Ошибка');return}countries.push(data);$('nf').value='';$('nn').value='';$('na').value='';renderACL();toast(flag+' '+name+' добавлена!')}
async function delC(id){if(!confirm('Удалить страну и все голоса?'))return;await sb.from('esc_votes').delete().eq('country_id',id);await sb.from('esc_countries').delete().eq('id',id);countries=countries.filter(c=>c.id!==id);renderACL();toast('Страна удалена')}

init();
</script>
</body>
</html>
